<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US MOD MD - Bot Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 20px; color: #58a6ff; }
  .header span { background: #238636; color: white; font-size: 11px; padding: 2px 8px; border-radius: 12px; }
  .container { max-width: 860px; margin: 32px auto; padding: 0 16px; }
  
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .card h2 { font-size: 16px; color: #58a6ff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
  input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; color: #e6edf3; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #58a6ff; }
  
  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #238636; color: white; }
  .btn-danger { background: #da3633; color: white; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  
  .code-box { background: #0d1117; border: 2px dashed #238636; border-radius: 10px; padding: 20px; text-align: center; margin-top: 16px; display: none; }
  .code-box .code { font-size: 32px; font-weight: 800; letter-spacing: 6px; color: #3fb950; font-family: monospace; }
  .code-box p { color: #8b949e; font-size: 13px; margin-top: 8px; }
  
  #sessions-list { display: grid; gap: 12px; }
  .session-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .session-info { display: flex; flex-direction: column; gap: 4px; }
  .session-num { font-size: 15px; font-weight: 600; }
  .session-id { font-size: 11px; color: #8b949e; font-family: monospace; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-connected { background: #1a4731; color: #3fb950; }
  .badge-connecting { background: #1a3249; color: #58a6ff; }
  .badge-reconnecting { background: #2d1f05; color: #e3b341; }
  .badge-pending { background: #2d2d2d; color: #8b949e; }
  .badge-logged_out { background: #3d1515; color: #f85149; }
  .badge-error { background: #3d1515; color: #f85149; }
  
  .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
  .msg-success { background: #1a4731; color: #3fb950; }
  .msg-error { background: #3d1515; color: #f85149; }
  
  .empty-state { text-align: center; color: #8b949e; padding: 32px; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 US MOD MD</h1>
  <span>Multi-Session Panel</span>
</div>

<div class="container">

  <!-- Add New Session -->
  <div class="card">
    <h2>➕ New Session Add Karo</h2>
    <div class="form-group">
      <label>WhatsApp Number (with country code, no +)</label>
      <input type="text" id="phoneInput" placeholder="923001234567" maxlength="15">
    </div>
    <button class="btn btn-primary" onclick="addSession()">🔗 Connect & Get Pairing Code</button>

    <div class="code-box" id="codeBox">
      <p>Yeh code WhatsApp mein enter karo:</p>
      <div class="code" id="codeText">----</div>
      <p style="margin-top:12px;">WhatsApp → Settings → Linked Devices → Link Device → Enter code manually</p>
    </div>

    <div class="msg" id="addMsg"></div>
  </div>

  <!-- Active Sessions -->
  <div class="card">
    <h2>📱 Active Sessions</h2>
    <div id="sessions-list"><div class="empty-state">Koi session nahi. Upar se add karo.</div></div>
  </div>

</div>

<script>
async function addSession() {
  const phone = document.getElementById('phoneInput').value.trim().replace(/[^0-9]/g, '');
  if (!phone || phone.length < 10) {
    showMsg('addMsg', '❌ Sahi number enter karo (country code ke saath)', 'error');
    return;
  }
  
  showMsg('addMsg', '⏳ Session bana raha hoon...', 'success');
  document.getElementById('codeBox').style.display = 'none';

  try {
    const res = await fetch('/api/session/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ownerNumber: phone })
    });
    const data = await res.json();
    
    if (!data.success) {
      showMsg('addMsg', '❌ ' + data.error, 'error');
      return;
    }

    showMsg('addMsg', '✅ Session bana! Pairing code aa raha hai (5-10 sec)...', 'success');
    
    // Poll for pairing code
    const sessionId = data.sessionId;
    let tries = 0;
    const interval = setInterval(async () => {
      tries++;
      const r = await fetch('/api/session/status/' + sessionId);
      const s = await r.json();
      if (s.pairingCode) {
        clearInterval(interval);
        document.getElementById('codeText').textContent = s.pairingCode;
        document.getElementById('codeBox').style.display = 'block';
        showMsg('addMsg', '✅ Code ready! WhatsApp mein enter karo.', 'success');
        loadSessions();
      }
      if (s.status === 'connected') {
        clearInterval(interval);
        document.getElementById('codeBox').style.display = 'none';
        showMsg('addMsg', '🎉 Connected!', 'success');
        loadSessions();
      }
      if (tries > 20) clearInterval(interval);
    }, 2000);

    loadSessions();
  } catch (e) {
    showMsg('addMsg', '❌ Server error: ' + e.message, 'error');
  }
}

async function deleteSession(sessionId) {
  if (!confirm('Yeh session delete karna chahte ho?')) return;
  await fetch('/api/session/delete/' + sessionId, { method: 'DELETE' });
  loadSessions();
}

async function loadSessions() {
  const res = await fetch('/api/sessions');
  const { sessions, active } = await res.json();
  const list = document.getElementById('sessions-list');
  
  const ids = Object.keys(sessions);
  if (ids.length === 0) {
    list.innerHTML = '<div class="empty-state">Koi session nahi. Upar se add karo.</div>';
    return;
  }

  list.innerHTML = ids.map(id => {
    const s = sessions[id];
    const a = active[id] || {};
    const status = a.status || s.status || 'pending';
    return \`<div class="session-card">
      <div class="session-info">
        <div class="session-num">📱 \${s.ownerNumber}</div>
        <div class="session-id">ID: \${id}</div>
        \${a.pairingCode ? \`<div style="color:#3fb950;font-size:13px;margin-top:4px;">Code: <b style="letter-spacing:3px">\${a.pairingCode}</b></div>\` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="badge badge-\${status}">\${status.toUpperCase()}</span>
        <button class="btn btn-danger btn-sm" onclick="deleteSession('\${id}')">🗑 Delete</button>
      </div>
    </div>\`;
  }).join('');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg msg-' + type;
  el.style.display = 'block';
}

// Auto refresh every 5 sec
loadSessions();
setInterval(loadSessions, 5000);
</script>
</body>
</html>
